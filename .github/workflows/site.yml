name: Site build

on:
  pull_request:
    paths:
      - site/**
      - _data/**
  push:
    branches:
      - master
    paths:
      - site/**
      - _data/**

jobs:
  site-build:
    name: Build Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Lint
        working-directory: site
        run: npm run lint

      - name: Type check
        working-directory: site
        env:
          ASTRO_TELEMETRY_DISABLED: "1"
        run: npm run check

      - name: Build Astro site
        working-directory: site
        env:
          ASTRO_TELEMETRY_DISABLED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build
